services:
  - type: web
    name: expense-tracker-bot
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GOOGLE_SHEETS_CREDS
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
